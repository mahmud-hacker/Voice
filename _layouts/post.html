---
layout: default
---
<article class="post-full" style="max-width:800px;margin:0 auto;padding:4rem clamp(1.5rem,5vw,4rem);">
  <div class="reveal">
    <div class="section-label" style="margin-bottom:1rem;">
      {% for tag in page.tags %}<span>{{ tag }}</span>{% endfor %}
    </div>
    <h1 style="font-family:'Cinzel',serif;font-size:clamp(2rem,5vw,3.2rem);font-weight:700;letter-spacing:0.03em;line-height:1.15;margin-bottom:1.5rem;">{{ page.title }}</h1>
    <div style="display:flex;align-items:center;gap:1rem;font-family:'Space Mono',monospace;font-size:0.68rem;color:var(--muted);letter-spacing:0.06em;margin-bottom:3rem;padding-bottom:2rem;border-bottom:1px solid var(--border);">
      <span>{{ page.date | date: "%B %d, %Y" }}</span>
      <span>·</span>
      <span>{{ site.about_name }}</span>
      {% if page.tags %}<span>·</span>{% for tag in page.tags %}<span style="color:var(--gold);">{{ tag }}</span>{% endfor %}{% endif %}
    </div>
    <div class="post-content" style="color:var(--text2);line-height:1.85;font-size:1.05rem;font-weight:300;">
      {{ content }}
    </div>
    <div style="margin-top:4rem;padding-top:2rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;">
      <a href="{{ '/' | relative_url }}" class="btn-ghost">← Back to all articles</a>
      <button class="bookmark-btn" data-title="{{ page.title }}" data-url="{{ page.url | relative_url }}" style="background:rgba(201,162,74,0.08);border:1px solid rgba(201,162,74,0.25);color:var(--gold);padding:0.6rem 1.2rem;border-radius:8px;cursor:pointer;font-family:'Space Mono',monospace;font-size:0.7rem;letter-spacing:0.06em;">🔖 Save to Reading List</button>
    </div>
  </div>
</article>
